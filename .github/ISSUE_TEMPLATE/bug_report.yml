name: Bug 报告
description: 报告可以稳定复现的问题
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 请清楚说明实际发生了什么。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 设备与系统
      placeholder: "例如：realme RMX3823 / Android 15 / v1.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先移除 API Key、访问令牌和其他敏感信息。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认问题中不包含 API Key 或其他敏感信息。
          required: true
        - label: 我已搜索现有 Issue，没有发现重复报告。
          required: true
